<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playground</title>
  <link rel="stylesheet" href="playground.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <span id="navTime"></span>
      <span>·</span>
      <span>Currently in Montreal</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="work.html">Work</a>
      <a href="playground.html">Playground</a>
      <a href="about.html">About</a>
    </div>
    <button class="nav-cta">GET IN TOUCH</button>
  </nav>

  <section id="playground">
    <div class="pg-layout">

      <div class="pg-names" id="pgNames">
        <div class="pg-fade pg-fade-top"></div>
        <div class="pg-fade pg-fade-bottom"></div>
      </div>

      <div class="pg-images" id="pgImages">
        <div class="pg-img-slot" data-index="0" style="background:#7B61FF;"></div>
        <div class="pg-img-slot" data-index="1" style="background:#FF6B6B;"></div>
        <div class="pg-img-slot" data-index="2" style="background:#43D9A2;"></div>
        <div class="pg-img-slot" data-index="3" style="background:#F5A623;"></div>
        <div class="pg-img-slot" data-index="4" style="background:#4ECDC4;"></div>
        <div class="pg-img-slot" data-index="5" style="background:#C0392B;"></div>
        <div class="pg-img-slot" data-index="6" style="background:#8E44AD;"></div>
        <div class="pg-img-slot" data-index="7" style="background:#2ECC71;"></div>
        <div class="pg-img-slot" data-index="8" style="background:#E67E22;"></div>
        <div class="pg-img-slot" data-index="9" style="background:#1ABC9C;"></div>
      </div>

    </div>
    <div class="pg-scroll-hint">(keep scrolling)</div>
  </section>

  <script src="playground.js"></script>
</body>
</html>
